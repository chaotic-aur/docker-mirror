services:
  nginx-letsencrypt:
    image: nginx
    container_name: nginx-letsencrypt
    hostname: ${DOMAIN_NAME:?err}
    volumes:
      - './http-root:/var/lib/nginx/html/http-root:ro'
      - './data/acme-letsencrypt:/var/lib/nginx/acme-letsencrypt:rw'
      - './preset/nginx.conf:/etc/nginx/nginx.conf:ro'
      # Static
      - './preset/conf.d/chaotic.conf:/etc/nginx/conf.d/chaotic.conf:ro'
      - './preset/conf.d/status.conf:/etc/nginx/conf.d/status.conf:ro'
      - './preset/conf.d/style.xslt:/etc/nginx/conf.d/style.xslt:ro'
      # Templates
      - './preset/templates-letsencrypt:/etc/nginx/templates:ro'
    environment:
      - DOMAIN_NAME=${DOMAIN_NAME}
      - EMAIL=${EMAIL}
    labels:
      com.datadoghq.ad.check_names: '["nginx"]'
      com.datadoghq.ad.init_configs: '[{}]'
      com.datadoghq.ad.instances: '[{"nginx_status_url": "http://%%host%%:81/nginx_status/"}]'
    ports:
      - '80:80'
      - '443:443'
    restart: ${RESTART:-unless-stopped}
    profiles:
      - letsencrypt

  nginx-cloudflared:
    image: nginx
    container_name: nginx-cloudflared
    hostname: ${DOMAIN_NAME:?err}
    volumes:
      - './http-root:/var/lib/nginx/html/http-root:ro'
      - './preset/nginx.conf:/etc/nginx/nginx.conf:ro'
      # Static
      - './preset/conf.d/chaotic.conf:/etc/nginx/conf.d/chaotic.conf:ro'
      - './preset/conf.d/status.conf:/etc/nginx/conf.d/status.conf:ro'
      - './preset/conf.d/style.xslt:/etc/nginx/conf.d/style.xslt:ro'
      # Templates
      - './preset/templates-cloudflared:/etc/nginx/templates:ro'
    environment:
      - DOMAIN_NAME=${DOMAIN_NAME}
    labels:
      com.datadoghq.ad.check_names: '["nginx"]'
      com.datadoghq.ad.init_configs: '[{}]'
      com.datadoghq.ad.instances: '[{"nginx_status_url": "http://%%host%%:81/nginx_status/"}]'
    restart: ${RESTART:-unless-stopped}
    profiles:
      - cloudflared

  syncthing:
    build: ./syncthing-custom
    container_name: syncthing
    hostname: ${DOMAIN_NAME:?err}
    environment:
      - PUID=1000
      - PGID=1000
    volumes:
        - './data/syncthing:/var/syncthing/config'
        - "${WEBROOT:-./http-root/chaotic-aur}:/repo"
    ports:
      - '127.0.0.1:8384:8384'
      - 22000:22000/tcp
      - 22000:22000/udp
      - 21027:21027/udp
    restart: ${RESTART:-unless-stopped}

  cloudflared:
    image: erisamoe/cloudflared:latest
    container_name: cloudflared
    command: --origincert /root/.cloudflared/cert.pem tunnel run --url http://nginx-cloudflared ${DOMAIN_NAME:?err}
    volumes:
      - './data/cloudflared/etc:/etc/cloudflared'
      - './data/cloudflared/home:/root'
      - './preset/passwd:/etc/passwd'
    restart: ${RESTART:-unless-stopped}
    profiles:
      - cloudflared
